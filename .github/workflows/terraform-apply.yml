name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - terraform/**

concurrency:
  group: terraform-apply
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci-runner

      - name: Generate ephemeral SSH keypair for Proxmox snippet upload
        run: |
          ssh-keygen -t ed25519 -N "" -f "${RUNNER_TEMP}/tf_ssh_key"
          {
            echo "PROXMOX_VE_SSH_PRIVATE_KEY<<EOF"
            cat "${RUNNER_TEMP}/tf_ssh_key"
            echo "EOF"
          } >>"$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Terraform apply
        env:
          PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN_ID }}=${{ secrets.PROXMOX_API_TOKEN_SECRET }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_MEDIACENTER_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TS_OAUTH_MEDIACENTER_CLIENT_SECRET }}
          TF_VAR_pve_host: ${{ secrets.PVE_TAILSCALE_HOST }}
        run: terraform -chdir=terraform apply -auto-approve -no-color
