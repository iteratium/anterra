name: Ansible Check

on:
  pull_request:
    paths:
      - ansible/**

concurrency:
  group: ansible-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - id: select
        uses: ./.github/actions/ansible-select

      - uses: ./.github/actions/ansible-setup
        with:
          ts-oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts-oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}

      - name: Syntax check
        run: ansible-playbook -i ansible/inventory/hosts.yaml ansible/site.yml --syntax-check

      - name: Connectivity check
        run: ansible -i ansible/inventory/hosts.yaml all -m ping

      - name: Ansible check (preview)
        id: check
        if: always() && steps.select.outputs.list != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
          UNIFI_CONSOLE_IP: ${{ secrets.UNIFI_CONSOLE_IP }}
        run: |
          set -o pipefail
          ansible-playbook -i ansible/inventory/hosts.yaml ${{ steps.select.outputs.list }} \
            --check --diff \
            --extra-vars "domain_name=$BASE_DOMAIN unifi_console_ip=$UNIFI_CONSOLE_IP" \
            2>&1 | tee "${RUNNER_TEMP}/check.log"
        continue-on-error: true

      - name: Build PR comment
        if: always()
        run: |
          {
            echo "### Ansible Check (preview)"
            echo
            echo "\`--check --diff\` is advisory — first-time installs report failures that a real apply resolves (a repo must be added before its packages are visible). The hard gates are the syntax and connectivity checks above."
            echo
            echo '```'
            cat "${RUNNER_TEMP}/check.log" 2>/dev/null || echo "(preview did not run)"
            echo '```'
          } > "${RUNNER_TEMP}/comment.md"

      - uses: marocchino/sticky-pull-request-comment@v3
        if: always()
        with:
          header: ansible-check
          path: ${{ runner.temp }}/comment.md
