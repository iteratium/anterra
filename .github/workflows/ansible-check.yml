name: Ansible Check

on:
  pull_request:
    paths:
      - ansible/**

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      docker: ${{ steps.filter.outputs.docker }}
      portainer: ${{ steps.filter.outputs.portainer }}
      caddy: ${{ steps.filter.outputs.caddy }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'ansible/inventory/**'
              - 'ansible/roles/**'
              - 'ansible/requirements.yml'
              - 'ansible/site.yml'
            docker:
              - 'ansible/playbooks/docker.yml'
            portainer:
              - 'ansible/playbooks/portainer.yml'
            caddy:
              - 'ansible/playbooks/caddy.yml'
              - 'ansible/playbooks/templates/**'

  check:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci-runner

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ansible
        run: pip install ansible

      - name: Install Galaxy dependencies
        run: |
          ansible-galaxy install -r ansible/requirements.yml
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Syntax check
        run: ansible-playbook -i ansible/inventory/hosts.yaml ansible/site.yml --syntax-check

      - name: Connectivity check
        run: ansible -i ansible/inventory/hosts.yaml all -m ping

      - name: Determine playbooks to preview
        id: playbooks
        run: |
          if [ "${{ needs.changes.outputs.shared }}" = "true" ]; then
            echo "list=ansible/site.yml" >> "$GITHUB_OUTPUT"
          else
            LIST=""
            [ "${{ needs.changes.outputs.docker }}" = "true" ] && LIST="$LIST ansible/playbooks/docker.yml"
            [ "${{ needs.changes.outputs.portainer }}" = "true" ] && LIST="$LIST ansible/playbooks/portainer.yml"
            [ "${{ needs.changes.outputs.caddy }}" = "true" ] && LIST="$LIST ansible/playbooks/caddy.yml"
            echo "list=$LIST" >> "$GITHUB_OUTPUT"
          fi

      - name: Ansible check (preview)
        id: check
        if: always() && steps.playbooks.outputs.list != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -o pipefail
          ansible-playbook -i ansible/inventory/hosts.yaml ${{ steps.playbooks.outputs.list }} --check --diff --extra-vars "domain_name=${{ secrets.BASE_DOMAIN }} unifi_console_ip=${{ secrets.UNIFI_CONSOLE_IP }}" 2>&1 | tee "${RUNNER_TEMP}/check.log"
        continue-on-error: true

      - name: Build PR comment
        if: always()
        run: |
          {
            echo "### Ansible Check (preview)"
            echo
            echo "\`--check --diff\` is advisory — first-time installs report failures that a real apply resolves (a repo must be added before its packages are visible). The hard gates are the syntax and connectivity checks above."
            echo
            echo '```'
            cat "${RUNNER_TEMP}/check.log" 2>/dev/null || echo "(preview did not run)"
            echo '```'
          } > "${RUNNER_TEMP}/comment.md"

      - uses: marocchino/sticky-pull-request-comment@v3
        if: always()
        with:
          header: ansible-check
          path: ${{ runner.temp }}/comment.md
