name: Terraform Taint (one-off)

on:
  workflow_dispatch:
    inputs:
      address:
        description: Resource address to taint
        required: true
        default: module.mediacenter.proxmox_virtual_environment_vm.mediacenter

permissions:
  contents: read

jobs:
  taint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Terraform taint
        run: terraform -chdir=terraform taint "${{ inputs.address }}"
