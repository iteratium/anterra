name: Terraform Untaint

on:
  workflow_dispatch:
    inputs:
      resource:
        description: "Resource address to untaint (e.g. portainer_stack.trmnl)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  untaint:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Untaint resource
        run: |
          terraform -chdir=terraform/portainer init
          terraform -chdir=terraform/portainer untaint "${{ inputs.resource }}"
